  <p>Hello promise! This is HTML5 Boilerplate.</p>
  
  <script>

    // 1. Create a new promise that resolves after 2 seconds
    var promise = new Promise(function(resolve, reject) {
      setTimeout(function() {
        //reject("Whoops! Something went wrong.");
        resolve("Promise resolved!");
      }, 2000);
    });

    // promise

    // 2. Rewriting the same promise using async/await
    async function asyncFunction() {
      try {
        var message = await promise;
        console.log(message);
      } catch (error) {
        console.error(error);
      }
    }

    asyncFunction();
